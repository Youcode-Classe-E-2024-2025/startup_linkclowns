<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page de paiement</title>
    <link rel="stylesheet" href="assets/css/page-de-payment.css">

</head>
<body>
    <section class="grid">
        <div img>
            <img class="img-car" src="assets/images/BOOK2-removebg-preview (1).png" alt="">
        </div>
        <div class="detail-de-paiement" method="get" >
            <form action="#" method="get">
                <div class="bar-detail"><h1>Detail de paiement</h1></div>
                <label for="name">Name</label>
                <input id="name" type="text" value="nom" placeholder="name:ex(ismail baoud)">
                <label for="card-n">Card namber</label>
                <img class="cards" src="assets/images/cards.png" alt="">
                <input id="card-n" type="number" value="card" placeholder="card number">
                <label class="date-l" for="date">Expiration date</label>
                <input  class="date" type="text" value="date" placeholder="MM/YY">
                <input  class="date cvc" type="number" value="cvc" placeholder="Code CVC">
                <label for="country">Country</label>
                <input type="text" placeholder="morocco" value="country">
                <button class="button-acheter" type="submit">Acheter mantenant</button>
            </form>
        </div>
        <div class="book">
            <img class="img-book" src="assets/images/book.png" alt="">
        </div>
    </section>
</body>
</html>
